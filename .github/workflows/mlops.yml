name: MLOps Pipeline

on:
  push:
    branches: [main, master]
    paths:
      - 'data/**.dvc'
      - 'src/**.py'
      - 'params.yaml'
  workflow_dispatch:

jobs:

  # ---------------------------------------------------------------------------
  # JOB 1 - UNIT TEST
  # Chạy unit tests trên dữ liệu ảo (không cần kết nối cloud storage).
  # Nếu có bất kỳ test nào thất bại, pipeline dừng lại ở đây.
  # ---------------------------------------------------------------------------
  test:
    name: Unit Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unit tests
        run: pytest tests/ -v


  # ---------------------------------------------------------------------------
  # JOB 2 - TRAIN
  # Xác thực cloud storage, pull dữ liệu bằng DVC, huấn luyện mô hình, upload artifact.
  # Chỉ chạy khi Job 1 (Unit Test) hoàn thành thành công.
  # ---------------------------------------------------------------------------
  train:
    name: Train
    needs: test
    runs-on: ubuntu-latest
    outputs:
      accuracy: ${{ steps.read_metrics.outputs.accuracy }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Authenticate and Pull data with DVC
        env:
          CLOUD_CREDENTIALS: ${{ secrets.CLOUD_CREDENTIALS }}
        run: |
          # Ghi credentials ra file
          echo "$CLOUD_CREDENTIALS" > /tmp/sa-key.json
          # Debug: kiểm tra file có hợp lệ không
          echo "File size: $(wc -c < /tmp/sa-key.json) bytes"
          python -c "
          import json, sys
          try:
              d = json.load(open('/tmp/sa-key.json'))
              print('JSON valid. type:', d.get('type'))
              print('SA email:', d.get('client_email'))
              print('project_id:', d.get('project_id'))
          except Exception as e:
              print('JSON INVALID:', e)
              print('First 200 chars:', open('/tmp/sa-key.json').read()[:200])
              sys.exit(1)
          "
          # Export env var và pull ngay trong cùng shell
          export GOOGLE_APPLICATION_CREDENTIALS=/tmp/sa-key.json
          dvc pull data/train_phase1.csv.dvc data/eval.csv.dvc

      - name: Train model
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/sa-key.json
        run: python src/train.py

      - name: Read metrics
        id: read_metrics
        run: |
          ACC=$(python -c "import json; d=json.load(open('outputs/metrics.json')); print(d['accuracy'])")
          echo "accuracy=$ACC" >> $GITHUB_OUTPUT
          echo "Accuracy: $ACC"

      - name: Upload model to Cloud Storage
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/sa-key.json
          CLOUD_BUCKET: ${{ secrets.CLOUD_BUCKET }}
        run: |
          python - <<'EOF'
          import os
          from google.cloud import storage

          bucket_name = os.environ["CLOUD_BUCKET"]
          client = storage.Client()
          bucket = client.bucket(bucket_name)
          blob = bucket.blob("models/latest/model.pkl")
          blob.upload_from_filename("models/model.pkl")
          print(f"Model uploaded to gs://{bucket_name}/models/latest/model.pkl")
          EOF

      - name: Save metrics as artifact
        uses: actions/upload-artifact@v4
        with:
          name: metrics
          path: outputs/metrics.json


  # ---------------------------------------------------------------------------
  # JOB 3 - EVAL
  # Kiểm tra ngưỡng chất lượng (accuracy >= 0.70).
  # Pipeline dừng lại ở đây nếu mô hình chưa đạt yêu cầu.
  # Chỉ chạy khi Job 2 (Train) hoàn thành thành công.
  # ---------------------------------------------------------------------------
  eval:
    name: Eval
    needs: train
    runs-on: ubuntu-latest
    steps:

      - name: Check eval gate
        # Nếu accuracy < 0.70 thì hủy deploy, ngược lại tiếp tục
        run: |
          python - <<'EOF'
          acc = float("${{ needs.train.outputs.accuracy }}")
          if acc < 0.70:
              raise SystemExit(f"FAILED: accuracy {acc:.4f} < 0.70. Hủy deploy.")
          print(f"PASSED: accuracy {acc:.4f} >= 0.70. Đang tiến hành deploy...")
          EOF


  # ---------------------------------------------------------------------------
  # JOB 4 - DEPLOY
  # Triển khai lên VM qua SSH.
  # Chỉ chạy khi Job 3 (Eval) hoàn thành thành công.
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy
    needs: eval
    runs-on: ubuntu-latest
    steps:

      - name: SSH deploy to VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            # Restart service để load model mới nhất từ GCS
            sudo systemctl restart mlops-serve

            # Chờ server khởi động xong
            sleep 5

            # Health check — thử tối đa 3 lần, mỗi lần cách nhau 5 giây
            for i in 1 2 3; do
              if curl -sf http://localhost:8000/health; then
                echo "Health check passed."
                exit 0
              fi
              echo "Attempt $i failed, retrying in 5s..."
              sleep 5
            done

            echo "Health check failed after 3 attempts."
            exit 1
