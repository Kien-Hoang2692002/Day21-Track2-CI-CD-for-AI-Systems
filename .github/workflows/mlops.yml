name: MLOps Pipeline

on:
  push:
    branches: [main, master]
    paths:
      - 'data/**.dvc'
      - 'src/**.py'
      - 'params.yaml'
      - '.github/workflows/mlops.yml'
  workflow_dispatch:

jobs:

  # ---------------------------------------------------------------------------
  # JOB 1 - UNIT TEST
  # ---------------------------------------------------------------------------
  test:
    name: Unit Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unit tests
        run: pytest tests/ -v


  # ---------------------------------------------------------------------------
  # JOB 2 - TRAIN
  # ---------------------------------------------------------------------------
  train:
    name: Train
    needs: test
    runs-on: ubuntu-latest
    outputs:
      accuracy: ${{ steps.read_metrics.outputs.accuracy }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Setup credentials and pull data
        env:
          CLOUD_CREDENTIALS_B64: ${{ secrets.CLOUD_CREDENTIALS }}
        run: |
          echo "=== Running commit: $(git rev-parse --short HEAD) ==="
          # Ghi JSON trực tiếp ra file qua python để tránh shell escaping
          python -c "
          import os, json
          raw = os.environ['CLOUD_CREDENTIALS_B64']
          # Thử parse trực tiếp (JSON thô)
          try:
              d = json.loads(raw)
              with open('/tmp/sa-key.json', 'w') as f:
                  json.dump(d, f)
              print('=== SA:', d['client_email'], '===')
          except Exception as e:
              print('JSON parse error:', e)
              raise
          "
          # Set credentialpath trong DVC local config
          dvc remote modify --local myremote credentialpath /tmp/sa-key.json
          # Pull data
          dvc pull data/train_phase1.csv.dvc data/eval.csv.dvc
          # Set cho các step sau
          echo "GOOGLE_APPLICATION_CREDENTIALS=/tmp/sa-key.json" >> $GITHUB_ENV

      - name: Train model
        run: python src/train.py

      - name: Read metrics
        id: read_metrics
        run: |
          ACC=$(python -c "import json; d=json.load(open('outputs/metrics.json')); print(d['accuracy'])")
          echo "accuracy=$ACC" >> $GITHUB_OUTPUT
          echo "Accuracy: $ACC"

      - name: Upload model to Cloud Storage
        env:
          CLOUD_BUCKET: ${{ secrets.CLOUD_BUCKET }}
        run: |
          python - <<'EOF'
          import os
          from google.cloud import storage

          bucket_name = os.environ["CLOUD_BUCKET"]
          client = storage.Client()
          bucket = client.bucket(bucket_name)
          blob = bucket.blob("models/latest/model.pkl")
          blob.upload_from_filename("models/model.pkl")
          print(f"Model uploaded to gs://{bucket_name}/models/latest/model.pkl")
          EOF

      - name: Save metrics as artifact
        uses: actions/upload-artifact@v4
        with:
          name: metrics
          path: outputs/metrics.json


  # ---------------------------------------------------------------------------
  # JOB 3 - EVAL
  # ---------------------------------------------------------------------------
  eval:
    name: Eval
    needs: train
    runs-on: ubuntu-latest
    steps:

      - name: Check eval gate
        run: |
          python - <<'EOF'
          acc = float("${{ needs.train.outputs.accuracy }}")
          if acc < 0.70:
              raise SystemExit(f"FAILED: accuracy {acc:.4f} < 0.70. Huy deploy.")
          print(f"PASSED: accuracy {acc:.4f} >= 0.70. Dang trien khai...")
          EOF


  # ---------------------------------------------------------------------------
  # JOB 4 - DEPLOY
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy
    needs: eval
    runs-on: ubuntu-latest
    steps:

      - name: SSH deploy to VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            sudo systemctl restart mlops-serve
            sleep 5
            for i in 1 2 3; do
              if curl -sf http://localhost:8000/health; then
                echo "Health check passed."
                exit 0
              fi
              echo "Attempt $i failed, retrying in 5s..."
              sleep 5
            done
            echo "Health check failed after 3 attempts."
            exit 1
